dataset:
  name: Fantasia Database
  version: 1.0.0
  manifest: data/manifests/fantasia.csv
  raw_dir: data/raw/fantasia/1.0.0

records:
  pilot:
    - f1y01
    - f1o01
  mode: all

ecg:
  sampling_rate_source: header
  channel_name: ECG
  detector:
    name: neurokit
    clean_method: neurokit
    peak_method: neurokit

benchmark:
  tolerances_ms:
    - 50
    - 100
  failure_plot_count: 5
  failure_window_seconds: 30

rr_nn:
  normal_symbols:
    - N
  valid_rr_ms:
    min: 300
    max: 2000
  window_seconds: 300

hrv_frequency:
  interpolation_hz: 4.0
  welch_nperseg_seconds: 64
  min_nn_intervals: 30
  bands_hz:
    lf:
      - 0.04
      - 0.15
    hf:
      - 0.15
      - 0.40
  lomb_frequency_grid_hz:
    min: 0.0033333333333333335
    max: 0.5
    count: 4096

uncertainty:
  seed: 20260622
  bootstrap_iterations: 2000
  ci: 0.95

artifact_experiment:
  seed: 20260622
  rates:
    - 0.001
    - 0.005
    - 0.01
    - 0.03
  repeats: 20
  types:
    - missed_beat
    - spurious_extra_beat
    - timestamp_jitter
    - ectopic_short_long
  strategies:
    - no_correction
    - delete_flagged_intervals
    - interpolate_flagged_intervals
  jitter_ms: 50
  ectopic_shift_fraction: 0.3

outputs:
  inventory_csv: results/hrv/data_quality/fantasia_inventory.csv
  peak_benchmark_csv: results/hrv/peak_benchmark/peak_benchmark_by_record.csv
  failure_plot_dir: figures/hrv/peak_failures
  reference_intervals_csv: results/hrv/rr_nn/reference_intervals.csv
  window_metrics_csv: results/hrv/rr_nn/window_metrics.csv
  artifact_sensitivity_csv: results/hrv/artifacts/artifact_sensitivity.csv
  artifact_summary_csv: results/hrv/artifacts/artifact_summary.csv
  frequency_window_metrics_csv: results/hrv/frequency/frequency_window_metrics.csv
  hrv_record_summary_csv: results/hrv/frequency/hrv_record_summary.csv
  hrv_uncertainty_csv: results/hrv/frequency/hrv_uncertainty.csv
  hrv_core_report_md: reports/hrv/core_report.md
