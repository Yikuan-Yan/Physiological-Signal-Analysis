dataset:
  name: Sleep-EDF Database Expanded
  version: 1.0.0
  doi: https://doi.org/10.13026/C2X676
  license: Open Data Commons Attribution License v1.0
  source_base_url: https://physionet.org/files/sleep-edfx/1.0.0
  cassette_index_url: https://physionet.org/files/sleep-edfx/1.0.0/sleep-cassette/
  raw_dir: data/raw/sleep-edfx/1.0.0
  manifest: data_manifest_sleep_edf.csv

cohort:
  include: sleep-cassette
  exclude:
    - sleep-telemetry

selection:
  rule: first_available_night_for_first_20_sorted_sleep_cassette_subjects
  participant_count: 20
  pilot_subjects:
    - 400
    - 401
  benchmark_subjects:
    - 400
    - 401
    - 402
    - 403
    - 404
    - 405
    - 406
    - 407
    - 408
    - 409
    - 410
    - 411
    - 412
    - 413
    - 414
    - 415
    - 416
    - 417
    - 418
    - 419

sleep_stages:
  epoch_seconds: 30
  reference_system: R&K
  mapped_classes:
    - WAKE
    - N1
    - N2
    - N3
    - REM
  label_mapping:
    W: WAKE
    "1": N1
    "2": N2
    "3": N3
    "4": N3
    R: REM
  excluded_labels:
    - M
    - "?"

channels:
  staging:
    eeg_name: Fpz-Cz
    eog_name: EOG horizontal
    emg_name: EMG submental
    preprocessing: yasa_sleepstaging_no_prefilter_or_zscore
  limitation: Sleep-EDF Fpz-Cz/Pz-Oz are not YASA's preferred central derivations.

outputs:
  selection_csv: results/sleep_edf/sleep_edf_selection.csv
  manifest_csv: data_manifest_sleep_edf.csv
  download_summary_csv: results/sleep_edf/download_summary.csv
  validation_csv: results/sleep_edf/sleep_edf_validation.csv
  preflight_report_md: reports/sleep_edf_preflight.md
